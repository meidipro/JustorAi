services:
  - type: web
    name: justorai-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.backend:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: VITE_GROQ_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        # Comma-separated list of allowed frontend origins
        # e.g. "https://justorai.vercel.app,http://localhost:5173"
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
